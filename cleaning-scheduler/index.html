<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cleaning Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f4f5f7;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #1c1c1c;
    }

    /* ── Auth Screen ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.09);
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #auth-screen .logo { font-size: 2.5rem; }

    #auth-screen h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1c1c1c;
    }

    #auth-screen p {
      color: #6b7280;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: #fff;
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e4e8;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1c1c1c;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #user-name {
      font-size: 0.85rem;
      color: #6b7280;
    }

    /* ── Main Content ── */
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem 1rem 2rem;
    }

    /* ── Buttons ── */
    .btn {
      padding: 0.55rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .btn-primary { background: #3d7a5e; color: #fff; }
    .btn-primary:hover { background: #2f6249; }
    .btn-primary:disabled { background: #c4c4c4; cursor: not-allowed; }

    .btn-sm { padding: 0.35rem 0.85rem; font-size: 0.82rem; }

    .btn-ghost {
      background: transparent;
      color: #3d7a5e;
      padding: 0.4rem 0;
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-ghost:hover { color: #2f6249; }

    .btn-icon {
      background: none;
      border: 1px solid #e2e4e8;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #3d7a5e;
      font-size: 1rem;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .btn-icon:hover { background: #edf7f2; border-color: #3d7a5e; }

    /* ── Calendar Toolbar ── */
    .cal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #cal-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1c1c1c;
      min-width: 148px;
      text-align: center;
    }

    /* ── Calendar Grid ── */
    #cal-grid {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid #e2e4e8;
      overflow: hidden;
    }

    .cal-day-header {
      padding: 0.5rem 0;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: #9ca3af;
      border-bottom: 1px solid #e2e4e8;
      background: #f9fafb;
    }

    .cal-day {
      padding: 0.4rem 0.45rem;
      min-height: 72px;
      border-right: 1px solid #e2e4e8;
      border-bottom: 1px solid #e2e4e8;
      cursor: pointer;
      transition: background 0.1s;
    }

    .cal-day:nth-child(7n) { border-right: none; }

    .cal-day:not(.other-month):hover { background: #f4f5f7; }

    .cal-day.other-month {
      cursor: default;
      background: #fafafa;
    }

    .cal-day.selected { background: #edf7f2 !important; }

    .cal-day.today .day-num {
      background: #3d7a5e;
      color: #fff;
      border-radius: 50%;
    }

    .day-num {
      font-size: 0.8rem;
      font-weight: 500;
      color: #1c1c1c;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
    }

    .cal-day.other-month .day-num { color: #d1d5db; }

    .day-dots {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      margin-top: 5px;
    }

    .day-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3d7a5e;
      display: inline-block;
      flex-shrink: 0;
    }

    .day-more {
      font-size: 0.62rem;
      color: #6b7280;
      line-height: 1;
    }

    /* ── Day Detail Panel ── */
    #day-detail {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      border-top: 3px solid #3d7a5e;
    }

    .day-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
      gap: 0.75rem;
    }

    #day-detail-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1c1c1c;
    }

    /* ── Job Cards ── */
    .job-card {
      background: #f9fafb;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      border-left: 3px solid #3d7a5e;
      margin-bottom: 0.5rem;
    }

    .job-card:last-child { margin-bottom: 0; }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.25rem;
    }

    .job-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1c1c1c;
    }

    .job-time {
      font-size: 0.82rem;
      font-weight: 500;
      color: #3d7a5e;
      white-space: nowrap;
      margin-left: 0.5rem;
    }

    .job-detail {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.2rem;
    }

    .state-msg {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #9ca3af;
      font-size: 0.92rem;
    }

    /* ── Form ── */
    #form-view { padding-bottom: 2rem; }

    .back-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .back-row h2 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1c1c1c;
    }

    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 0.35rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #fff;
      border: 1px solid #e2e4e8;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      color: #1c1c1c;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3d7a5e;
      box-shadow: 0 0 0 3px rgba(61,122,94,0.12);
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── Slot Chips ── */
    #slots-section { margin-bottom: 1.1rem; }

    #slots-section > p {
      font-size: 0.82rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }

    #slots { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .slot-chip {
      padding: 0.4rem 0.9rem;
      border: 1.5px solid #e2e4e8;
      border-radius: 20px;
      background: #fff;
      color: #1c1c1c;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .slot-chip:hover { border-color: #3d7a5e; color: #3d7a5e; }
    .slot-chip.selected { background: #3d7a5e; border-color: #3d7a5e; color: #fff; }

    #slots-loading { font-size: 0.88rem; color: #9ca3af; padding: 0.4rem 0; }
    #no-slots { font-size: 0.88rem; color: #b45309; padding: 0.4rem 0; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .cal-day { min-height: 52px; padding: 0.3rem 0.25rem; }
      .cal-day-header { font-size: 0.65rem; }
      .cal-toolbar { flex-direction: column; align-items: flex-start; }
      #cal-title { min-width: 120px; }
      #user-name { display: none; }
      .auth-card { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">🧹</div>
    <h1>Cleaning Scheduler</h1>
    <p>Connect your Google Calendar to manage appointments and find open time slots.</p>
    <button class="btn btn-primary" id="sign-in-btn">Connect Google Calendar</button>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app" hidden>
  <header>
    <h1>🧹 Scheduler</h1>
    <div id="user-info">
      <span id="user-name"></span>
      <button class="btn btn-ghost" id="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- Calendar Dashboard -->
    <div id="dashboard-view">
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="btn-icon" id="prev-month">&#8592;</button>
          <span id="cal-title">June 2026</span>
          <button class="btn-icon" id="next-month">&#8594;</button>
          <button class="btn btn-ghost" id="today-btn" hidden style="padding:0.35rem 0.75rem;font-size:0.82rem;">Today</button>
        </div>
        <button class="btn btn-primary" id="add-btn">+ New Appointment</button>
      </div>

      <div id="cal-grid">
        <p class="state-msg" style="grid-column:1/-1;">Loading…</p>
      </div>

      <div id="day-detail" hidden>
        <div class="day-detail-header">
          <span id="day-detail-title"></span>
          <button class="btn btn-primary btn-sm" id="book-on-day-btn">+ Book this day</button>
        </div>
        <div id="day-detail-jobs"></div>
      </div>
    </div>

    <!-- Add Appointment Form -->
    <div id="form-view" hidden>
      <div class="back-row">
        <button class="btn btn-ghost" id="back-btn">← Back</button>
        <h2>New Appointment</h2>
      </div>

      <form id="appointment-form" autocomplete="off">
        <div class="form-group">
          <label for="f-name">Client Name</label>
          <input id="f-name" type="text" name="clientName" placeholder="Jane Smith" required>
        </div>

        <div class="form-group">
          <label for="f-phone">Phone Number</label>
          <input id="f-phone" type="tel" name="phone" placeholder="(555) 123-4567" required>
        </div>

        <div class="form-group">
          <label for="f-address">Address</label>
          <input id="f-address" type="text" name="address" placeholder="123 Main St, City, ST" required>
        </div>

        <div class="form-group">
          <label for="f-service">Service Type</label>
          <select id="f-service" name="serviceType">
            <option value="standard">Standard Clean (2 hrs)</option>
            <option value="deep">Deep Clean (4 hrs)</option>
            <option value="moveout">Move-out Clean (6 hrs)</option>
            <option value="custom">Custom Duration</option>
          </select>
        </div>

        <div class="form-group" id="custom-duration-wrap" hidden>
          <label for="f-duration">Duration (hours)</label>
          <input id="f-duration" type="number" name="customDuration" min="1" max="12" step="0.5" placeholder="3">
        </div>

        <div class="form-group">
          <label for="f-date">Date</label>
          <input id="f-date" type="date" name="date" required>
        </div>

        <div id="slots-loading" hidden>Checking availability…</div>
        <div id="no-slots" hidden>No available slots on this date. Try another day.</div>

        <div id="slots-section" hidden>
          <div class="form-group">
            <p>Available Times</p>
            <div id="slots"></div>
          </div>
        </div>

        <input type="hidden" name="selectedSlot">

        <div class="form-group">
          <label for="f-notes">Notes / Special Instructions</label>
          <textarea id="f-notes" name="notes" placeholder="Has a dog, key under mat, focus on kitchen…"></textarea>
        </div>

        <button class="btn btn-primary" type="submit" id="submit-btn" disabled style="width:100%;padding:0.75rem;">
          Book Appointment
        </button>
      </form>
    </div>
  </main>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  // ─────────────────────────────────────────
  // CONFIGURATION
  // ─────────────────────────────────────────
  const CLIENT_ID = '854568792646-a6oleovdeab0jc75bra1dulnsaisk0ii.apps.googleusercontent.com';

  const SCOPES         = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly';
  const WORK_START_HOUR = 8;
  const WORK_END_HOUR   = 18;
  const SLOT_STEP_MINS  = 30;

  const SERVICE_DURATIONS = { standard: 2, deep: 4, moveout: 6 };
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  // ── State ──
  let tokenClient, accessToken;
  let calYear, calMonth;   // currently displayed month
  let calEvents  = [];     // events for the displayed month
  let selectedDay = null;  // 'YYYY-MM-DD' or null

  // ── DOM ──
  const authScreen    = document.getElementById('auth-screen');
  const appEl         = document.getElementById('app');
  const dashboardView = document.getElementById('dashboard-view');
  const formView      = document.getElementById('form-view');
  const slotsSection  = document.getElementById('slots-section');
  const slotsDiv      = document.getElementById('slots');
  const slotsLoading  = document.getElementById('slots-loading');
  const noSlots       = document.getElementById('no-slots');
  const submitBtn     = document.getElementById('submit-btn');
  const form          = document.getElementById('appointment-form');
  const customDurWrap = document.getElementById('custom-duration-wrap');
  const userNameEl    = document.getElementById('user-name');
  const dayDetail     = document.getElementById('day-detail');
  const dayDetailTitle = document.getElementById('day-detail-title');
  const dayDetailJobs  = document.getElementById('day-detail-jobs');

  // ── Boot ──
  window.addEventListener('load', () => {
    const tryInit = (attempts) => {
      if (window.google?.accounts?.oauth2) {
        initAuth();
      } else if (attempts > 0) {
        setTimeout(() => tryInit(attempts - 1), 300);
      } else {
        document.getElementById('sign-in-btn').textContent = 'Failed to load Google — refresh page';
      }
    };
    tryInit(20);

    document.getElementById('sign-in-btn').onclick  = () => tokenClient.requestAccessToken();
    document.getElementById('sign-out-btn').onclick = signOut;
    document.getElementById('add-btn').onclick       = () => showForm();
    document.getElementById('back-btn').onclick      = showDashboard;
    document.getElementById('prev-month').onclick    = () => navigateMonth(-1);
    document.getElementById('next-month').onclick    = () => navigateMonth(1);
    document.getElementById('today-btn').onclick     = jumpToToday;
    document.getElementById('book-on-day-btn').onclick = () => showForm(selectedDay);

    document.getElementById('f-service').addEventListener('change', onServiceChange);
    document.getElementById('f-date').addEventListener('change', onDateChange);
    form.addEventListener('submit', onSubmit);

    document.getElementById('f-date').min = todayStr();
  });

  // ── Auth ──
  function initAuth() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback(resp) {
        if (resp.error) { alert('Sign-in failed: ' + resp.error); return; }
        accessToken = resp.access_token;
        fetchUserInfo();
        showApp();
      }
    });
  }

  async function fetchUserInfo() {
    try {
      const resp = await callApi('GET', 'https://www.googleapis.com/oauth2/v3/userinfo');
      userNameEl.textContent = resp.name || resp.email || '';
    } catch { /* non-critical */ }
  }

  function signOut() {
    google.accounts.oauth2.revoke(accessToken, () => {
      accessToken = null;
      calYear = calMonth = undefined;
      calEvents = [];
      selectedDay = null;
      appEl.hidden = true;
      authScreen.hidden = false;
    });
  }

  // ── Views ──
  function showApp() {
    authScreen.hidden = true;
    appEl.hidden = false;
    showDashboard();
  }

  function showDashboard() {
    formView.hidden = true;
    dashboardView.hidden = false;

    if (!calYear) {
      const now = new Date();
      calYear  = now.getFullYear();
      calMonth = now.getMonth();
    }

    loadCalendar();
  }

  function showForm(prefillDate = null) {
    dashboardView.hidden = true;
    formView.hidden = false;
    form.reset();
    clearSlots();
    submitBtn.disabled  = true;
    customDurWrap.hidden = true;

    const dateInput = document.getElementById('f-date');
    dateInput.min = todayStr();

    if (prefillDate) {
      dateInput.value = prefillDate;
      onDateChange({ target: dateInput });
    }
  }

  // ── Calendar ──
  function navigateMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    selectedDay = null;
    dayDetail.hidden = true;
    loadCalendar();
  }

  function jumpToToday() {
    const now = new Date();
    calYear   = now.getFullYear();
    calMonth  = now.getMonth();
    selectedDay = null;
    dayDetail.hidden = true;
    loadCalendar();
  }

  async function loadCalendar() {
    document.getElementById('cal-grid').innerHTML =
      '<p class="state-msg" style="grid-column:1/-1;padding:3rem 1rem;">Loading…</p>';

    const monthStart = new Date(calYear, calMonth, 1);
    const monthEnd   = new Date(calYear, calMonth + 1, 0, 23, 59, 59);

    try {
      const data = await callApi('GET',
        'https://www.googleapis.com/calendar/v3/calendars/primary/events', {
          timeMin:      monthStart.toISOString(),
          timeMax:      monthEnd.toISOString(),
          orderBy:      'startTime',
          singleEvents: 'true',
          maxResults:   '250'
        });

      calEvents = (data.items || []).filter(e =>
        e.summary && e.summary.startsWith('Cleaning –')
      );

      renderCalendar();
    } catch (err) {
      document.getElementById('cal-grid').innerHTML =
        `<p class="state-msg" style="grid-column:1/-1;color:#b45309;">Could not load calendar: ${escHtml(err.message)}</p>`;
    }
  }

  function renderCalendar() {
    const now      = new Date();
    const todayDs  = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const isCurrent = calYear === now.getFullYear() && calMonth === now.getMonth();

    document.getElementById('cal-title').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
    document.getElementById('today-btn').hidden = isCurrent;

    // Build event map: dateStr -> events[]
    const evMap = {};
    calEvents.forEach(ev => {
      const s  = new Date(ev.start.dateTime || ev.start.date);
      const ds = `${s.getFullYear()}-${pad(s.getMonth()+1)}-${pad(s.getDate())}`;
      if (!evMap[ds]) evMap[ds] = [];
      evMap[ds].push(ev);
    });

    const firstOfMonth = new Date(calYear, calMonth, 1);
    const startOffset  = firstOfMonth.getDay(); // 0=Sun
    const grid         = document.getElementById('cal-grid');

    // Day-of-week headers
    const headers = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      .map(d => `<div class="cal-day-header">${d}</div>`).join('');

    // 42 cells (6 weeks)
    const cells = [];
    const cursor = new Date(calYear, calMonth, 1 - startOffset);

    for (let i = 0; i < 42; i++) {
      const y  = cursor.getFullYear();
      const m  = cursor.getMonth();
      const d  = cursor.getDate();
      const ds = `${y}-${pad(m+1)}-${pad(d)}`;

      const inMonth   = m === calMonth && y === calYear;
      const isToday   = ds === todayDs;
      const isSel     = ds === selectedDay;
      const dayEvs    = evMap[ds] || [];

      let cls = 'cal-day';
      if (!inMonth) cls += ' other-month';
      if (isToday)  cls += ' today';
      if (isSel)    cls += ' selected';

      const dots = dayEvs.slice(0, 3).map(() => '<span class="day-dot"></span>').join('');
      const more = dayEvs.length > 3 ? `<span class="day-more">+${dayEvs.length - 3}</span>` : '';
      const dotsHtml = dayEvs.length ? `<div class="day-dots">${dots}${more}</div>` : '';

      cells.push(
        `<div class="${cls}" data-date="${ds}" data-in-month="${inMonth}">` +
          `<span class="day-num">${d}</span>${dotsHtml}` +
        `</div>`
      );

      cursor.setDate(cursor.getDate() + 1);
    }

    grid.innerHTML = headers + cells.join('');

    grid.querySelectorAll('.cal-day[data-in-month="true"]').forEach(cell => {
      cell.addEventListener('click', () => selectDay(cell.dataset.date));
    });

    // Re-render detail panel if selected day is still in this month
    if (selectedDay) {
      const [sy, sm] = selectedDay.split('-').map(Number);
      if (sy === calYear && sm - 1 === calMonth) {
        renderDayDetail();
      } else {
        selectedDay = null;
        dayDetail.hidden = true;
      }
    }
  }

  function selectDay(dateStr) {
    if (selectedDay === dateStr) {
      // Toggle off
      selectedDay = null;
      dayDetail.hidden = true;
      document.querySelectorAll('.cal-day.selected').forEach(c => c.classList.remove('selected'));
      return;
    }

    selectedDay = dateStr;
    document.querySelectorAll('.cal-day').forEach(c => c.classList.remove('selected'));
    document.querySelector(`.cal-day[data-date="${dateStr}"]`)?.classList.add('selected');
    renderDayDetail();
  }

  function renderDayDetail() {
    const [y, m, d] = selectedDay.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    dayDetailTitle.textContent = date.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    const dayEvs = calEvents.filter(ev => {
      const s  = new Date(ev.start.dateTime || ev.start.date);
      const ds = `${s.getFullYear()}-${pad(s.getMonth()+1)}-${pad(s.getDate())}`;
      return ds === selectedDay;
    });

    if (dayEvs.length === 0) {
      dayDetailJobs.innerHTML = '<p style="font-size:0.88rem;color:#9ca3af;padding:0.25rem 0;">No jobs booked — tap "+ Book this day" to add one.</p>';
    } else {
      dayDetailJobs.innerHTML = dayEvs.map(renderJobCard).join('');
    }

    dayDetail.hidden = false;
    dayDetail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function renderJobCard(ev) {
    const start   = new Date(ev.start.dateTime || ev.start.date);
    const end     = new Date(ev.end.dateTime   || ev.end.date);
    const name    = ev.summary.replace('Cleaning – ', '');
    const desc    = ev.description || '';
    const phone   = (desc.match(/Phone: ([^\n]+)/)   || [])[1] || '';
    const service = (desc.match(/Service: ([^\n]+)/) || [])[1] || '';

    return `
      <div class="job-card">
        <div class="job-header">
          <span class="job-name">${escHtml(name)}</span>
          <span class="job-time">${fmtTime(start)} – ${fmtTime(end)}</span>
        </div>
        ${ev.location ? `<div class="job-detail">📍 ${escHtml(ev.location)}</div>` : ''}
        ${service     ? `<div class="job-detail">🧹 ${escHtml(service)}</div>`      : ''}
        ${phone       ? `<div class="job-detail">📞 ${escHtml(phone)}</div>`        : ''}
      </div>`;
  }

  // ── Form helpers ──
  function onServiceChange(e) {
    customDurWrap.hidden = e.target.value !== 'custom';
    const date = document.getElementById('f-date').value;
    if (date) onDateChange({ target: document.getElementById('f-date') });
  }

  async function onDateChange(e) {
    const dateVal = e.target.value;
    if (!dateVal) return;

    const dur = getDuration();
    if (!dur) return;

    clearSlots();
    slotsLoading.hidden = false;

    try {
      const slots = await getAvailableSlots(dateVal, dur);
      slotsLoading.hidden = true;

      if (slots.length === 0) { noSlots.hidden = false; return; }

      slotsDiv.innerHTML = slots.map(s =>
        `<button type="button" class="slot-chip" data-iso="${s.toISOString()}">${fmtTime(s)}</button>`
      ).join('');

      slotsDiv.querySelectorAll('.slot-chip').forEach(chip => {
        chip.onclick = () => selectSlot(chip);
      });

      slotsSection.hidden = false;
    } catch (err) {
      slotsLoading.hidden = true;
      noSlots.textContent = 'Error checking availability: ' + err.message;
      noSlots.hidden = false;
    }
  }

  function selectSlot(chip) {
    slotsDiv.querySelectorAll('.slot-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    form.querySelector('[name="selectedSlot"]').value = chip.dataset.iso;
    submitBtn.disabled = false;
  }

  function clearSlots() {
    slotsSection.hidden = true;
    noSlots.hidden = true;
    slotsLoading.hidden = true;
    slotsDiv.innerHTML = '';
    form.querySelector('[name="selectedSlot"]').value = '';
    submitBtn.disabled = true;
  }

  function getDuration() {
    const svc = document.getElementById('f-service').value;
    if (svc === 'custom') {
      const v = parseFloat(document.getElementById('f-duration').value);
      return isNaN(v) ? null : v;
    }
    return SERVICE_DURATIONS[svc];
  }

  async function getAvailableSlots(dateStr, durationHrs) {
    const dayStart = new Date(`${dateStr}T00:00:00`);
    const dayEnd   = new Date(`${dateStr}T23:59:59`);

    const data = await callApi('POST',
      'https://www.googleapis.com/calendar/v3/freeBusy', {}, {
        timeMin: dayStart.toISOString(),
        timeMax: dayEnd.toISOString(),
        items:   [{ id: 'primary' }]
      });

    const busy       = (data.calendars?.primary?.busy) || [];
    const durationMs = durationHrs * 3600 * 1000;
    const slots      = [];

    let cursor  = new Date(`${dateStr}T${pad(WORK_START_HOUR)}:00:00`);
    const limit = new Date(`${dateStr}T${pad(WORK_END_HOUR)}:00:00`);

    while (cursor.getTime() + durationMs <= limit.getTime()) {
      const slotEnd  = new Date(cursor.getTime() + durationMs);
      const occupied = busy.some(b => {
        const bs = new Date(b.start), be = new Date(b.end);
        return cursor < be && slotEnd > bs;
      });
      if (!occupied) slots.push(new Date(cursor));
      cursor = new Date(cursor.getTime() + SLOT_STEP_MINS * 60 * 1000);
    }

    return slots;
  }

  async function onSubmit(e) {
    e.preventDefault();
    const fd = new FormData(form);
    const d  = Object.fromEntries(fd.entries());
    if (!d.selectedSlot) return;

    const dur = getDuration();
    const serviceLabels = {
      standard: 'Standard Clean (2 hrs)',
      deep:     'Deep Clean (4 hrs)',
      moveout:  'Move-out Clean (6 hrs)',
      custom:   `Custom (${dur} hrs)`
    };

    const start = new Date(d.selectedSlot);
    const end   = new Date(start.getTime() + dur * 3600 * 1000);

    const descLines = [`Phone: ${d.phone}`, `Service: ${serviceLabels[d.serviceType]}`];
    if (d.notes.trim()) descLines.push(`Notes: ${d.notes.trim()}`);

    const event = {
      summary:     `Cleaning – ${d.clientName}`,
      location:    d.address,
      description: descLines.join('\n'),
      start:       { dateTime: start.toISOString() },
      end:         { dateTime: end.toISOString() }
    };

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Booking…';

    try {
      await callApi('POST',
        'https://www.googleapis.com/calendar/v3/calendars/primary/events', {}, event);
      submitBtn.textContent      = '✓ Booked!';
      submitBtn.style.background = '#2a9d8f';

      // Navigate calendar to the booked month so the dot shows up
      const bookedDate = new Date(d.selectedSlot);
      calYear  = bookedDate.getFullYear();
      calMonth = bookedDate.getMonth();
      selectedDay = `${calYear}-${pad(calMonth+1)}-${pad(bookedDate.getDate())}`;

      setTimeout(() => {
        submitBtn.textContent      = 'Book Appointment';
        submitBtn.style.background = '';
        showDashboard();
      }, 1200);
    } catch (err) {
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Book Appointment';
      alert('Could not create event: ' + err.message);
    }
  }

  // ── API wrapper ──
  async function callApi(method, url, params = {}, body = null) {
    const qs      = new URLSearchParams(params).toString();
    const fullUrl = qs ? `${url}?${qs}` : url;

    const opts = {
      method,
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(fullUrl, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    return res.status === 204 ? null : res.json();
  }

  // ── Utils ──
  function fmtTime(d) {
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
</script>
</body>
